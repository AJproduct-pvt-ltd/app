  // ---------------- PROFIT (admin only) ----------------
  // Cost of goods sold for a bill = the sum of the per-line "cost" values
  // recorded at the moment of sale (see completeBill's use of
  // consumeStockFIFO), so this stays accurate even if items' purchase
  // prices change later. Bills placed before this feature existed have
  // no recorded cost and are treated as 0 cost (unknown).
  function billCOGS(b){
    return (b.items||[]).reduce(function(s,it){ return s + (typeof it.cost==='number' ? it.cost : 0); }, 0);
  }
  function billProfit(b){ return b.total - billCOGS(b); }

  function filteredProfitBills(){
    return state.bills.filter(function(b){
      var day = b.dateISO.slice(0,10);
      if(state.profitFrom && day < state.profitFrom) return false;
      if(state.profitTo && day > state.profitTo) return false;
      return true;
    });
  }
  function groupProfitByDay(bills){
    var map = {};
    bills.forEach(function(b){
      var day = b.dateISO.slice(0,10);
      if(!map[day]) map[day] = {key:day, label:new Date(day).toLocaleDateString(), revenue:0, cost:0, profit:0, bills:0};
      var cogs = billCOGS(b);
      map[day].revenue += b.total;
      map[day].cost += cogs;
      map[day].profit += (b.total - cogs);
      map[day].bills++;
    });
    return Object.keys(map).sort().reverse().map(function(k){ return map[k]; });
  }
  function groupProfitByMonth(bills){
    var map = {};
    bills.forEach(function(b){
      var mk = monthKey(b.dateISO);
      if(!map[mk]) map[mk] = {key:mk, label:new Date(mk+'-01').toLocaleDateString(undefined,{month:'long', year:'numeric'}), revenue:0, cost:0, profit:0, bills:0};
      var cogs = billCOGS(b);
      map[mk].revenue += b.total;
      map[mk].cost += cogs;
      map[mk].profit += (b.total - cogs);
      map[mk].bills++;
    });
    return Object.keys(map).sort().reverse().map(function(k){ return map[k]; });
  }

  function renderProfit(){
    var bills = filteredProfitBills();
    var totalRevenue = bills.reduce(function(s,b){ return s+b.total; },0);
    var totalCost = bills.reduce(function(s,b){ return s+billCOGS(b); },0);
    var totalProfit = totalRevenue - totalCost;
    var margin = totalRevenue>0 ? (totalProfit/totalRevenue*100) : 0;
    var byBill = state.profitView==='bybill';
    var groups = state.profitView==='monthly' ? groupProfitByMonth(bills) : (byBill ? null : groupProfitByDay(bills));

    var rows;
    if(byBill){
      var billsSorted = bills.slice().sort(function(a,b){ return new Date(b.dateISO)-new Date(a.dateISO); });
      rows = billsSorted.map(function(b){
        var cost = billCOGS(b), profit = b.total - cost;
        return '<tr><td>'+b.no+'</td><td>'+new Date(b.dateISO).toLocaleString()+'</td>'+
          '<td>'+(b.customerName?escapeHtml(b.customerName):'<span style="color:var(--text-dim);">—</span>')+'</td>'+
          '<td class="num">'+money(b.total)+'</td><td class="num">'+money(cost)+'</td>'+
          '<td class="num" style="font-weight:700;color:'+(profit>=0?'var(--green)':'var(--red)')+';">'+money(profit)+'</td></tr>';
      }).join('') || '<tr><td colspan="6" style="text-align:center;color:var(--text-dim);padding:18px;">No sales in this range.</td></tr>';
    } else {
      rows = groups.map(function(g){
        return '<tr><td>'+escapeHtml(g.label)+'</td><td class="num">'+g.bills+'</td><td class="num">'+money(g.revenue)+'</td><td class="num">'+money(g.cost)+'</td>'+
          '<td class="num" style="font-weight:700;color:'+(g.profit>=0?'var(--green)':'var(--red)')+';">'+money(g.profit)+'</td></tr>';
      }).join('') || '<tr><td colspan="5" style="text-align:center;color:var(--text-dim);padding:18px;">No sales in this range.</td></tr>';
    }

    var tableHead = byBill ?
      '<tr><th>Bill</th><th>Date</th><th>Customer</th><th>Revenue</th><th>Cost</th><th>Profit</th></tr>' :
      '<tr><th>'+(state.profitView==='monthly'?'Month':'Date')+'</th><th>Bills</th><th>Revenue</th><th>Cost</th><th>Profit</th></tr>';

    return ''+
    '<h1 class="page-title">Profit</h1><p class="page-sub">Revenue minus the actual cost of the stock sold, viewed day by day, month by month, or bill by bill.</p>'+
    '<div class="stat-grid">'+
      '<div class="stat-card accent"><div class="lbl">Revenue</div><div class="val">'+money(totalRevenue)+'</div></div>'+
      '<div class="stat-card"><div class="lbl">Cost of goods</div><div class="val">'+money(totalCost)+'</div></div>'+
      '<div class="stat-card"><div class="lbl">Profit</div><div class="val" style="color:'+(totalProfit>=0?'var(--green)':'var(--red)')+';">'+money(totalProfit)+'</div></div>'+
      '<div class="stat-card"><div class="lbl">Margin</div><div class="val">'+margin.toFixed(1)+'%</div></div>'+
    '</div>'+
    '<div class="card" style="margin-top:16px;">'+
      '<div class="form-row">'+
        '<div class="field"><label>From</label><input type="date" id="profit-from" value="'+(state.profitFrom||'')+'"></div>'+
        '<div class="field"><label>To</label><input type="date" id="profit-to" value="'+(state.profitTo||'')+'"></div>'+
      '</div>'+
      '<div style="display:flex;gap:8px;margin:4px 0 14px;flex-wrap:wrap;">'+
        '<button class="btn btn-sm '+(state.profitView==='daily'?'btn-primary':'btn-ghost')+'" data-pview="daily">Daily</button>'+
        '<button class="btn btn-sm '+(state.profitView==='monthly'?'btn-primary':'btn-ghost')+'" data-pview="monthly">Monthly</button>'+
        '<button class="btn btn-sm '+(byBill?'btn-primary':'btn-ghost')+'" data-pview="bybill">By Bill</button>'+
      '</div>'+
      '<table><thead>'+tableHead+'</thead><tbody>'+rows+'</tbody></table>'+
    '</div>'+
    '<div class="demo-hint" style="margin-top:14px;">Cost is taken from the purchase price recorded on the stock batch each sale actually drew from — restocking at a new price never changes the cost of a sale that already happened.</div>';
  }

  function bindAdminEvents(){
    document.querySelectorAll('[data-atab]').forEach(function(btn){
      btn.addEventListener('click', function(){ state.adminTab = btn.getAttribute('data-atab'); state.itemForm=null; state.userForm=null; render(); });
    });

    // items
    var addItemBtn = document.getElementById('add-item-btn');
    if(addItemBtn) addItemBtn.addEventListener('click', function(){ state.itemForm = {id:null, name:'', category:'', price:0, stock:0, image:'', purchasePrice:0}; render(); });
    document.querySelectorAll('[data-edit-item]').forEach(function(btn){
      btn.addEventListener('click', function(){
        var it = state.items.find(function(i){ return i.id===btn.getAttribute('data-edit-item'); });
        state.itemForm = Object.assign({}, it);
        render();
      });
    });
    document.querySelectorAll('[data-del-item]').forEach(function(btn){
      btn.addEventListener('click', async function(){
        var id = btn.getAttribute('data-del-item');
        if(!confirm('Delete this item?')) return;
        state.items = state.items.filter(function(i){ return i.id!==id; });
        await persist('items');
        render();
      });
    });
    var fSave = document.getElementById('f-save');
    if(fSave) fSave.addEventListener('click', async function(){
      var name = document.getElementById('f-name').value.trim();
      var cat = document.getElementById('f-cat').value.trim();
      var price = parseFloat(document.getElementById('f-price').value)||0;
      var image = state.itemForm.image || '';
      if(!name) return;
      if(state.itemForm.id){
        // Editing: name/category/selling price/image only. Stock and its
        // purchase price are managed via +Restock on the Stock page so
        // earlier batches never get silently overwritten here.
        var it = state.items.find(function(i){ return i.id===state.itemForm.id; });
        it.name=name; it.category=cat; it.price=price; it.image=image;
      } else {
        var stockEl = document.getElementById('f-stock');
        var ppEl = document.getElementById('f-purchase-price');
        var stock = stockEl ? (parseInt(stockEl.value,10)||0) : 0;
        var purchasePrice = ppEl ? (parseFloat(ppEl.value)||0) : 0;
        var batches = stock>0 ? [{id:uid('b'), qty:stock, purchasePrice:purchasePrice, dateISO:new Date().toISOString()}] : [];
        state.items.push({id:uid('it'), name:name, category:cat, price:price, stock:stock, image:image, purchasePrice:purchasePrice, batches:batches});
      }
      await persist('items');
      state.itemForm = null;
      render();
    });
    var fCancel = document.getElementById('f-cancel');
    if(fCancel) fCancel.addEventListener('click', function(){ state.itemForm=null; render(); });

    function captureItemFormFields(){
      state.itemForm.name = document.getElementById('f-name').value;
      state.itemForm.category = document.getElementById('f-cat').value;
      state.itemForm.price = document.getElementById('f-price').value;
      var stockEl = document.getElementById('f-stock');
      if(stockEl) state.itemForm.stock = stockEl.value;
      var ppEl = document.getElementById('f-purchase-price');
      if(ppEl) state.itemForm.purchasePrice = ppEl.value;
    }
    var fImage = document.getElementById('f-image');
    if(fImage) fImage.addEventListener('change', function(e){
      var file = e.target.files[0];
      if(!file) return;
      captureItemFormFields();
      resizeImageFile(file, 300, function(dataUrl){
        state.itemForm.image = dataUrl;
        render();
      });
    });
    var fImageRemove = document.getElementById('f-image-remove');
    if(fImageRemove) fImageRemove.addEventListener('click', function(){
      captureItemFormFields();
      state.itemForm.image = '';
      render();
    });

    // users
    var addUserBtn = document.getElementById('add-user-btn');
    if(addUserBtn) addUserBtn.addEventListener('click', function(){ state.userForm = {name:'', username:'', password:'', role:'cashier'}; state.userFormErr=''; render(); });
    document.querySelectorAll('[data-edit-user]').forEach(function(btn){
      btn.addEventListener('click', function(){
        var id = btn.getAttribute('data-edit-user');
        var u = state.users.find(function(x){ return x.id===id; });
        if(!u) return;
        state.userForm = {id:u.id, name:u.name, username:u.username, password:u.password, role:u.role};
        state.userFormErr='';
        render();
      });
    });
    document.querySelectorAll('[data-del-user]').forEach(function(btn){
      btn.addEventListener('click', async function(){
        var id = btn.getAttribute('data-del-user');
        if(!confirm('Remove this user?')) return;
        state.users = state.users.filter(function(u){ return u.id!==id; });
        if(state.userForm && state.userForm.id===id) state.userForm=null;
        await persist('users');
        render();
      });
    });
    var uSave = document.getElementById('u-save');
    if(uSave) uSave.addEventListener('click', async function(){
      var name = document.getElementById('u-name').value.trim();
      var username = document.getElementById('u-username').value.trim();
      var password = document.getElementById('u-pass').value;
      var role = document.getElementById('u-role').value;
      var editingId = state.userForm && state.userForm.id;
      if(!name || !username || !password){ state.userFormErr='All fields are required.'; render(); return; }
      if(state.users.some(function(u){ return u.username.toLowerCase()===username.toLowerCase() && u.id!==editingId; })){
        state.userFormErr='That username is already taken.'; render(); return;
      }
      if(editingId){
        var existing = state.users.find(function(u){ return u.id===editingId; });
        if(existing){
          existing.name = name;
          existing.username = username;
          existing.password = password;
          existing.role = role;
          if(state.currentUser && state.currentUser.id===editingId){
            state.currentUser.name = name;
            state.currentUser.username = username;
            state.currentUser.role = role;
          }
        }
      } else {
        state.users.push({id:uid('u'), name:name, username:username, password:password, role:role});
      }
      await persist('users');
      state.userForm=null;
      render();
    });
    var uCancel = document.getElementById('u-cancel');
    if(uCancel) uCancel.addEventListener('click', function(){ state.userForm=null; render(); });

    // printer
    var pConnect = document.getElementById('p-connect');
    if(pConnect) pConnect.addEventListener('click', connectPrinter);
    var pDisconnect = document.getElementById('p-disconnect');
    if(pDisconnect) pDisconnect.addEventListener('click', disconnectPrinter);

    // shop settings
    var sSave = document.getElementById('s-save');
    if(sSave) sSave.addEventListener('click', async function(){
      state.shop.name = document.getElementById('s-name').value.trim() || state.shop.name;
      state.shop.address = document.getElementById('s-address').value.trim();
      state.shop.phone = document.getElementById('s-phone').value.trim();
      state.shop.currency = document.getElementById('s-currency').value.trim() || 'Rs.';
      state.shop.footer = document.getElementById('s-footer').value.trim();
      state.shop.width = document.getElementById('s-width').value;
      var billStartVal = parseInt(document.getElementById('s-bill-start').value, 10);
      state.shop.billStart = billStartVal>=1 ? billStartVal : 1;
      var billPrefixEl = document.getElementById('s-bill-prefix');
      if(billPrefixEl) state.shop.billPrefix = billPrefixEl.value.trim() || 'AJ';
      var repLabelEl = document.getElementById('s-rep-label');
      if(repLabelEl) state.shop.repLabel = repLabelEl.value.trim() || 'Sales Rep';
      var repLabelFullEl = document.getElementById('s-rep-label-full');
      if(repLabelFullEl) state.shop.repLabelFull = repLabelFullEl.value.trim() || 'Sales Representative';
      var printToggleEl = document.getElementById('s-printing-enabled');
      if(printToggleEl) state.shop.printingEnabled = printToggleEl.checked;
      sSave.disabled = true;
      sSave.textContent = 'Saving…';
      var ok = await persist('shop');
      state.shopSaveMsg = ok ? {ok:true, text:'Saved.'} : {ok:false, text:'Save failed: '+(state.storageErr||'could not reach Google Sheet.')};
      render();
    });

    function captureShopFields(){
      state.shop.name = document.getElementById('s-name').value.trim() || state.shop.name;
      state.shop.address = document.getElementById('s-address').value.trim();
      state.shop.phone = document.getElementById('s-phone').value.trim();
      state.shop.currency = document.getElementById('s-currency').value.trim() || 'Rs.';
      state.shop.footer = document.getElementById('s-footer').value.trim();
      state.shop.width = document.getElementById('s-width').value;
      var billStartVal2 = parseInt(document.getElementById('s-bill-start').value, 10);
      state.shop.billStart = billStartVal2>=1 ? billStartVal2 : 1;
      var billPrefixEl2 = document.getElementById('s-bill-prefix');
      if(billPrefixEl2) state.shop.billPrefix = billPrefixEl2.value.trim() || 'AJ';
      var repLabelEl2 = document.getElementById('s-rep-label');
      if(repLabelEl2) state.shop.repLabel = repLabelEl2.value.trim() || 'Sales Rep';
      var repLabelFullEl2 = document.getElementById('s-rep-label-full');
      if(repLabelFullEl2) state.shop.repLabelFull = repLabelFullEl2.value.trim() || 'Sales Representative';
      var printToggleEl = document.getElementById('s-printing-enabled');
      if(printToggleEl) state.shop.printingEnabled = printToggleEl.checked;
    }
    var sPrintingToggle = document.getElementById('s-printing-enabled');
    if(sPrintingToggle) sPrintingToggle.addEventListener('change', async function(){
      captureShopFields();
      var ok = await persist('shop');
      state.shopSaveMsg = ok ? {ok:true, text:'Saved.'} : {ok:false, text:'Save failed: '+(state.storageErr||'could not reach Google Sheet.')};
      render();
    });

    var pinSave = document.getElementById('pin-save');
    if(pinSave) pinSave.addEventListener('click', async function(){
      var cur = document.getElementById('pin-current').value.trim();
      var next = document.getElementById('pin-new').value.trim();
      var conf = document.getElementById('pin-confirm').value.trim();
      var currentPin = state.shop.adminPin || '1234';
      if(cur !== currentPin){ state.pinChangeMsg={ok:false,text:'Current PIN is incorrect.'}; render(); return; }
      if(!/^\d{4}$/.test(next)){ state.pinChangeMsg={ok:false,text:'New PIN must be exactly 4 digits.'}; render(); return; }
      if(next !== conf){ state.pinChangeMsg={ok:false,text:'New PIN and confirmation do not match.'}; render(); return; }
      state.shop.adminPin = next;
      pinSave.disabled = true;
      pinSave.textContent = 'Saving…';
      var ok = await persist('shop');
      state.pinChangeMsg = ok ? {ok:true,text:'PIN changed.'} : {ok:false,text:'Save failed: '+(state.storageErr||'could not reach Google Sheet.')};
      render();
    });

    var profitPinSave = document.getElementById('profit-pin-save');
    if(profitPinSave) profitPinSave.addEventListener('click', async function(){
      var cur = document.getElementById('profit-pin-current').value.trim();
      var next = document.getElementById('profit-pin-new').value.trim();
      var conf = document.getElementById('profit-pin-confirm').value.trim();
      var currentPin = state.shop.profitPin || '1234';
      if(cur !== currentPin){ state.profitPinChangeMsg={ok:false,text:'Current PIN is incorrect.'}; render(); return; }
      if(!/^\d{4}$/.test(next)){ state.profitPinChangeMsg={ok:false,text:'New PIN must be exactly 4 digits.'}; render(); return; }
      if(next !== conf){ state.profitPinChangeMsg={ok:false,text:'New PIN and confirmation do not match.'}; render(); return; }
      state.shop.profitPin = next;
      profitPinSave.disabled = true;
      profitPinSave.textContent = 'Saving…';
      var ok = await persist('shop');
      state.profitPinChangeMsg = ok ? {ok:true,text:'PIN changed.'} : {ok:false,text:'Save failed: '+(state.storageErr||'could not reach Google Sheet.')};
      render();
    });

    var resetAllBtn = document.getElementById('reset-all-btn');
    if(resetAllBtn) resetAllBtn.addEventListener('click', async function(){
      if(!confirm('This will permanently delete ALL items, users, bills and shop settings, and restore the original demo data. This cannot be undone. Continue?')) return;
      if(!confirm('Are you absolutely sure? Type OK to confirm this is your final answer.')) return;
      resetAllBtn.disabled = true;
      resetAllBtn.textContent = 'Resetting…';
      seedDefaults();
      state.shop = Object.assign({}, DEFAULT_SHOP);
      await Promise.all([
        storageSet(STORE_KEY_ITEMS, state.items),
        storageSet(STORE_KEY_USERS, state.users),
        storageSet(STORE_KEY_BILLS, state.bills),
        storageSet(STORE_KEY_SHOP, state.shop)
      ]);
      try{ localStorage.removeItem(PRINTER_STORE_KEY); }catch(e){}
      state.cart = [];
      state.itemForm = null;
      state.userForm = null;
      state.view = 'billing';
      alert('All data has been reset.');
      render();
    });
  }

  // ---------------- SHELL BIND ----------------
  function bindShell(){
    document.querySelectorAll('[data-nav]').forEach(function(btn){
      btn.addEventListener('click', function(){
        var next = btn.getAttribute('data-nav');
        if(next!=='profit'){ state.profitUnlocked=false; state.profitPinInput=''; state.profitPinErr=''; }
        state.view = next;
        state.itemForm=null; state.userForm=null;
        state.payFormOpenId=null; state.billEditForm=null;
        render();
      });
    });
    if(state.view==='billing') bindBillingEvents();
    if(state.view==='accounts') bindAccountsEvents();
    if(state.view==='customers') bindCustomersEvents();
    if(state.view==='stock') bindStockEvents();
    if(state.view==='reports') bindReportsEvents();
    if(state.view==='profit' && state.currentUser.role==='admin'){
      if(state.profitUnlocked) bindProfitEvents(); else bindProfitLockEvents();
    }
    if(state.view==='admin') bindAdminEvents();
    if(state.view==='accounts' || state.view==='stock' || state.view==='reports' || state.view==='customers') bindPageActions();
    if(state.showReceipt) bindReceiptModal();
    if(state.printerModalOpen) bindPrinterSettingsModal();
  }

  if('serviceWorker' in navigator){
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('service-worker.js').catch(function(){});
    });
  }

  boot();
})();
</script>
</body>
</html>
