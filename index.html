<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AJ PRODUCTS</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0F3D75">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AJ PRODUCTS">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"></noscript>
<style>
  :root{
    --ink:#0F3D75;
    --ink-light:#1B4E8F;
    --green:#2563EB;
    --green-light:#4F8EF7;
    --paper:#F3F8FF;
    --paper-dark:#E4EDFB;
    --amber:#F5A623;
    --red:#DC3D3D;
    --text:#14213D;
    --text-dim:#5C7089;
    --line:#D9E4F5;
    --white:#FFFFFF;
  }
  *{box-sizing:border-box;}
  body{margin:0;padding:0;background:transparent;}
  #app{
    font-family:'Plus Jakarta Sans',sans-serif;
    color:var(--text);
    background:var(--paper);
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }
  .mono{font-family:'JetBrains Mono',monospace;}
  button{font-family:inherit;cursor:pointer;}
  input,select{font-family:inherit;}
  ::selection{background:var(--amber);color:var(--ink);}

  /* ---------- LOGIN ---------- */
  .login-wrap{
    flex:1;display:flex;align-items:center;justify-content:center;
    background:
      repeating-linear-gradient(135deg, rgba(20,33,61,0.03) 0 2px, transparent 2px 14px),
      var(--paper);
    padding:24px;
  }
  .login-card{
    background:var(--white);
    border:1px solid var(--line);
    border-radius:4px;
    width:100%;max-width:380px;
    padding:32px 28px 28px;
    box-shadow:0 10px 30px rgba(20,33,61,0.08);
    position:relative;
  }
  .login-card::before{
    content:"";
    position:absolute; top:-1px; left:20px; right:20px; height:8px;
    background: radial-gradient(circle at 6px 0, transparent 5px, var(--paper) 5.5px) repeat-x;
    background-size:16px 8px;
  }
  .brand{display:flex;align-items:baseline;gap:8px;margin-bottom:4px;}
  .brand .mark{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:22px;color:var(--green);}
  .brand .name{font-weight:800;font-size:20px;letter-spacing:-0.02em;color:var(--ink);}
  .tagline{color:var(--text-dim);font-size:13px;margin-bottom:24px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--text-dim);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em;}
  .field input,.field select{
    width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:6px;
    font-size:16px;background:var(--white);color:var(--text);
  }
  .field input:focus,.field select:focus{outline:none;border-color:var(--green);}
  .btn{
    border:none;border-radius:7px;padding:12px 18px;font-weight:700;font-size:14.5px;
    letter-spacing:.02em;transition:transform .08s ease, filter .15s ease;min-height:44px;
  }
  .btn:active{transform:translateY(1px);}
  .btn-primary{background:var(--green);color:var(--white);}
  .btn-primary:hover{filter:brightness(1.08);}
  .btn-block{width:100%;}
  .btn-amber{background:var(--amber);color:var(--ink);}
  .btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line);}
  .btn-danger{background:var(--red);color:var(--white);}
  .btn-sm{padding:6px 10px;font-size:12.5px;border-radius:3px;}
  .error-msg{color:var(--red);font-size:13px;margin:-4px 0 12px;}
  .demo-hint{margin-top:18px;padding:10px 12px;background:var(--paper);border-radius:3px;font-size:11.5px;color:var(--text-dim);border:1px dashed var(--line);}
  .demo-hint b{color:var(--text);}

  /* ---------- SHELL ---------- */
  .topbar{
    background:var(--ink);color:var(--white);
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 20px;position:sticky;top:0;z-index:20;
  }
  .topbar .brand2{display:flex;align-items:center;gap:8px;font-weight:800;font-size:16px;}
  .topbar .brand2 .mark{font-family:'JetBrains Mono',monospace;color:var(--amber);}
  .who{display:flex;align-items:center;gap:10px;font-size:13px;}
  .who .role-badge{
    background:var(--green);color:var(--white);font-size:10px;font-weight:700;
    padding:2px 7px;border-radius:10px;text-transform:uppercase;letter-spacing:.03em;
  }
  .logout-btn{background:transparent;border:1px solid rgba(255,255,255,.3);color:var(--white);
    padding:6px 12px;border-radius:3px;font-size:12.5px;}
  .logout-btn:hover{background:rgba(255,255,255,.1);}

  .layout{display:flex;flex:1;min-height:0;}
  .sidebar{
    width:190px;flex-shrink:0;background:var(--ink-light);color:var(--white);
    padding:16px 10px;display:flex;flex-direction:column;gap:2px;
  }
  .nav-item{
    display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:4px;
    color:rgba(255,255,255,.75);font-size:14px;font-weight:600;background:transparent;border:none;
    text-align:left;width:100%;
  }
  .nav-item svg{width:16px;height:16px;flex-shrink:0;}
  .nav-item:hover{background:rgba(255,255,255,.06);color:var(--white);}
  .nav-item.active{background:var(--green);color:var(--white);}
  .nav-divider{height:1px;background:rgba(255,255,255,.12);margin:10px 4px;}
  .nav-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.4);padding:8px 12px 2px;}

  .content{flex:1;min-width:0;padding:22px;overflow-y:auto;}
  .page-title{font-size:22px;font-weight:800;color:var(--ink);letter-spacing:-0.01em;margin:0 0 4px;}
  .page-sub{color:var(--text-dim);font-size:13.5px;margin:0 0 20px;}

  .card{background:var(--white);border:1px solid var(--line);border-radius:5px;padding:16px;}
  .grid2{display:grid;grid-template-columns:1.5fr 1fr;gap:18px;align-items:start;}

  /* ---------- BILLING: items ---------- */
  .search-row{display:flex;gap:8px;margin-bottom:14px;}
  .search-row input{flex:1;padding:10px 12px;border:1.5px solid var(--line);border-radius:3px;font-size:14px;}
  .item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
  .item-tile{
    border:1.5px solid var(--line);border-radius:5px;padding:12px 12px 10px;background:var(--white);
    text-align:left;position:relative;overflow:hidden;
  }
  .item-tile:disabled{opacity:.45;cursor:not-allowed;}
  .item-tile:not(:disabled):hover{border-color:var(--green);box-shadow:0 2px 8px rgba(47,110,79,.12);}
  .item-tile .nm{font-weight:700;font-size:13.5px;color:var(--ink);margin-bottom:6px;display:block;}
  .item-tile .pr{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--green);font-size:14.5px;}
  .item-tile .st{font-size:11px;color:var(--text-dim);margin-top:4px;}
  .item-tile .st.low{color:var(--red);font-weight:700;}
  .cat-tag{position:absolute;top:8px;right:8px;font-size:9px;background:var(--paper-dark);color:var(--text-dim);
    padding:2px 6px;border-radius:8px;text-transform:uppercase;letter-spacing:.03em;}
  .item-thumb{width:100%;height:64px;border-radius:4px;overflow:hidden;margin-bottom:8px;background:var(--paper);
    display:flex;align-items:center;justify-content:center;}
  .item-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .item-thumb-placeholder{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:20px;color:var(--text-dim);}
  .thumb-sm{width:34px;height:34px;border-radius:4px;overflow:hidden;flex-shrink:0;background:var(--paper);
    display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;color:var(--text-dim);}
  .thumb-sm img{width:100%;height:100%;object-fit:cover;display:block;}
  .logo-preview{max-width:160px;max-height:70px;border:1px solid var(--line);border-radius:4px;background:var(--white);padding:4px;display:block;margin-bottom:8px;}
  .r-logo{max-width:70%;max-height:60px;margin:0 auto 6px;display:block;}

  /* ---------- CUSTOMER AUTOFILL DROPDOWN ---------- */
  .cust-field-wrap{position:relative;}
  .cust-suggest-list{
    position:absolute;top:100%;left:0;right:0;margin-top:2px;
    background:var(--white);border:1.5px solid var(--line);border-radius:6px;
    max-height:220px;overflow-y:auto;z-index:30;
    box-shadow:0 8px 20px rgba(20,33,61,.14);
  }
  .cust-suggest-item{padding:10px 12px;font-size:13.5px;cursor:pointer;border-bottom:1px solid var(--line);}
  .cust-suggest-item:last-child{border-bottom:none;}
  .cust-suggest-item:hover{background:var(--paper);}
  .cust-suggest-item .nm{font-weight:700;color:var(--ink);}
  .cust-suggest-item .ph{font-size:11.5px;color:var(--text-dim);margin-top:1px;}

  /* ---------- CART ---------- */
  .cart-box{position:sticky;top:8px;}
  .cart-title{font-weight:800;font-size:15px;color:var(--ink);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
  .cart-empty{color:var(--text-dim);font-size:13px;text-align:center;padding:26px 10px;border:1.5px dashed var(--line);border-radius:4px;}
  .cart-line{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line);}
  .cart-line .nm{flex:1;font-size:13px;font-weight:600;}
  .qty-ctrl{display:flex;align-items:center;gap:6px;}
  .qty-ctrl button{width:22px;height:22px;border:1px solid var(--line);background:var(--paper);border-radius:3px;font-weight:700;font-size:13px;line-height:1;}
  .qty-ctrl span{width:20px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:13px;}
  .line-total{width:64px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;}
  .rm-btn{color:var(--red);background:none;border:none;font-size:15px;padding:0 2px;}

  .sum-row{display:flex;justify-content:space-between;font-size:13.5px;padding:4px 0;color:var(--text-dim);}
  .sum-row.total{font-size:17px;font-weight:800;color:var(--ink);border-top:1.5px dashed var(--line);margin-top:6px;padding-top:10px;}
  .sum-row .val{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--text);}
  .sum-row.total .val{color:var(--green);}

  .discount-row{display:flex;gap:6px;align-items:center;margin:10px 0;}
  .discount-row select{padding:8px;border:1.5px solid var(--line);border-radius:3px;font-size:12.5px;}
  .discount-row input{width:80px;padding:8px;border:1.5px solid var(--line);border-radius:3px;font-size:13px;}

  .pay-tabs{display:flex;gap:6px;margin:12px 0 8px;}
  .pay-tab{flex:1;padding:8px 4px;border:1.5px solid var(--line);border-radius:3px;background:var(--white);
    font-size:12px;font-weight:700;color:var(--text-dim);}
  .pay-tab.active{background:var(--ink);color:var(--white);border-color:var(--ink);}

  /* ---------- TABLES ---------- */
  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-dim);
    padding:8px 10px;border-bottom:2px solid var(--line);}
  td{padding:9px 10px;border-bottom:1px solid var(--line);}
  tr:last-child td{border-bottom:none;}
  .num{font-family:'JetBrains Mono',monospace;}
  .pill{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:9px;text-transform:uppercase;}
  .pill.cash{background:#DFF0E6;color:var(--green);}
  .pill.cheque{background:#FDF0DA;color:#8A5E12;}
  .pill.account{background:#FBE3E1;color:var(--red);}
  .pill.paid{background:#DCEBFF;color:var(--green);}
  .pill.partial{background:#FDF0DA;color:#8A5E12;}
  .pill.unpaid{background:#FBE3E1;color:var(--red);}
  .acct-row-actions{display:flex;gap:6px;flex-wrap:wrap;}
  .inline-pay{display:flex;gap:6px;align-items:center;margin-top:8px;flex-wrap:wrap;}
  .inline-pay input{width:110px;padding:8px;border:1.5px solid var(--line);border-radius:5px;font-size:14px;}
  .edit-line{display:flex;gap:6px;align-items:center;padding:6px 0;border-bottom:1px solid var(--line);}
  .edit-line input{padding:6px 8px;border:1.5px solid var(--line);border-radius:4px;font-size:13px;}
  .edit-line .en{flex:1;}
  .edit-line .eq{width:56px;}
  .edit-line .ep{width:80px;}

  /* ---------- STAT CARDS ---------- */
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px;}
  .stat-card{background:var(--white);border:1px solid var(--line);border-radius:5px;padding:14px 16px;}
  .stat-card .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-dim);font-weight:700;}
  .stat-card .val{font-family:'JetBrains Mono',monospace;font-size:23px;font-weight:700;color:var(--ink);margin-top:4px;}
  .stat-card.accent .val{color:var(--green);}
  .bars{display:flex;align-items:flex-end;gap:8px;height:120px;margin-top:6px;}
  .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;}
  .bar-col .bar{width:100%;background:var(--green-light);border-radius:3px 3px 0 0;min-height:2px;}
  .bar-col .lbl{font-size:10px;color:var(--text-dim);}

  /* ---------- FORMS / ADMIN ---------- */
  .form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
  .form-row .field{flex:1;min-width:120px;margin-bottom:0;}
  .list-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);}
  .list-row:last-child{border-bottom:none;}
  .list-row .main{flex:1;}
  .list-row .main .t1{font-weight:700;font-size:13.5px;}
  .list-row .main .t2{font-size:12px;color:var(--text-dim);}
  .badge-role{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;text-transform:uppercase;}
  .badge-role.admin{background:var(--ink);color:var(--white);}
  .badge-role.cashier{background:var(--paper-dark);color:var(--text-dim);}

  .section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .section-head h3{margin:0;font-size:15px;color:var(--ink);}

  /* ---------- MODAL / RECEIPT ---------- */
  .modal-bg{position:fixed;inset:0;background:rgba(20,33,61,.55);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
  .modal-box{background:var(--white);border-radius:6px;max-width:420px;width:100%;max-height:90vh;overflow-y:auto;padding:20px;}
  .receipt-wrap{background:var(--white);border:1.5px dashed var(--line);padding:14px 16px 22px;font-family:'JetBrains Mono',monospace;font-size:12px;color:#111;
    clip-path: polygon(0 0,100% 0,100% 96%,97% 100%,94% 96%,91% 100%,88% 96%,85% 100%,82% 96%,79% 100%,76% 96%,73% 100%,70% 96%,67% 100%,64% 96%,61% 100%,58% 96%,55% 100%,52% 96%,49% 100%,46% 96%,43% 100%,40% 96%,37% 100%,34% 96%,31% 100%,28% 96%,25% 100%,22% 96%,19% 100%,16% 96%,13% 100%,10% 96%,7% 100%,4% 96%,0 100%);
  }
  .receipt-wrap.w58{max-width:220px;margin:0 auto;font-size:10.5px;}
  .receipt-wrap.w80{max-width:300px;margin:0 auto;}
  .r-center{text-align:center;}
  .r-line{display:flex;justify-content:space-between;}
  .r-hr{border-top:1px dashed #999;margin:8px 0;}
  .r-shopname{font-weight:700;font-size:15px;}
  .r-item-row{display:flex;justify-content:space-between;margin-bottom:2px;}
  .r-item-name{flex:1;}
  .modal-actions{display:flex;gap:8px;margin-top:10px;}
  .printer-status{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text-dim);margin-top:14px;}
  .printer-status .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .printer-status .dot.ok{background:var(--green);}
  .printer-status .dot.off{background:var(--line);}
  .printer-msg{font-size:11.5px;color:var(--text-dim);margin-top:4px;background:var(--paper);border-radius:3px;padding:6px 8px;}
  .page-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .busy-overlay{position:fixed;inset:0;background:rgba(20,33,61,.55);display:flex;align-items:center;justify-content:center;z-index:200;}
  .busy-box{background:var(--white);border-radius:8px;padding:26px 34px;display:flex;flex-direction:column;align-items:center;gap:14px;box-shadow:0 10px 30px rgba(20,33,61,.25);}
  .busy-spinner{width:34px;height:34px;border-radius:50%;border:4px solid var(--paper-dark);border-top-color:var(--green);animation:busy-spin .8s linear infinite;}
  .busy-text{font-size:13px;color:var(--text);font-weight:600;}
  @keyframes busy-spin{to{transform:rotate(360deg);}}
  .close-x{position:absolute;top:10px;right:14px;background:none;border:none;font-size:20px;color:var(--text-dim);}

  /* ---------- BOTTOM TAB (mobile) ---------- */
  .bottom-tabs{display:none;}
  .empty-note{color:var(--text-dim);font-size:13px;padding:20px;text-align:center;}
  .note-box{background:#FDF0DA;border:1px solid #E9CC93;color:#8A5E12;font-size:12px;padding:10px 12px;border-radius:4px;margin-bottom:16px;}

  @media print{
    body *{visibility:hidden;}
    #print-area, #print-area *{visibility:visible;}
    #print-area{position:absolute;top:0;left:0;width:100%;}
  }

  @media (max-width:860px){
    .grid2{grid-template-columns:1fr;}
    .sidebar{display:none;}
    .content{padding:12px 12px calc(84px + env(safe-area-inset-bottom));}
    .layout{flex-direction:column;}
    .topbar{padding:10px 14px;}
    .item-grid{grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:8px;}
    .item-tile{padding:10px 10px 8px;}
    .cart-box{position:static;}
    .bottom-tabs{
      display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--ink);z-index:30;
      border-top:1px solid rgba(255,255,255,.1);padding-bottom:env(safe-area-inset-bottom);
    }
    .bottom-tabs button{
      flex:1;background:none;border:none;color:rgba(255,255,255,.65);padding:9px 2px 8px;
      display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9.5px;font-weight:700;
      min-height:48px;
    }
    .bottom-tabs button.active{color:var(--amber);}
    .bottom-tabs svg{width:18px;height:18px;}
    .stat-grid{grid-template-columns:repeat(2,1fr);}
    .form-row .field{min-width:100%;}
    table{font-size:12.5px;}
    th,td{padding:7px 6px;}
  }
  @media (max-width:420px){
    .item-grid{grid-template-columns:repeat(auto-fill,minmax(92px,1fr));}
    .page-title{font-size:19px;}
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
(function(){
  "use strict";

  var ICONS = {
    cart:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>',
    box:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8L12 3 3 8l9 5 9-5z"/><path d="M3 8v8l9 5 9-5V8"/><path d="M12 13v8"/></svg>',

  // Debounce helper: full-page re-render on every keystroke is what makes
  // typing feel slow (especially on phones), because the whole shell
  // (including the shop logo image) gets rebuilt each time. Debouncing
  // lets the browser's own input box stay instant while we defer the
  // heavier re-render until typing pauses briefly.
  function debounce(fn, wait){
    var t;
    return function(){
      var args = arguments, ctx = this;
      clearTimeout(t);
      t = setTimeout(function(){ fn.apply(ctx, args); }, wait);
    };
  }

  var renderDebounced = debounce(render, 160);

  // Printing is a shop-wide on/off switch (Admin > Shop settings). When off,
  // every print button/flow is hidden across the app — sharing a bill as a
  // photo is unaffected, since that's not "printing".
  function printingEnabled(){ return state.shop.printingEnabled !== false; }
  function todayISO(){ return new Date().toISOString().slice(0,10); }
  function monthKey(d){ return d.slice(0,7); }

  // =====================================================================
  // STOCK PURCHASE-PRICE BATCHES
  // Every time stock is added it's recorded as its own "batch" with the
  // purchase price paid for it. Older batches are never touched or
  // rewritten by a later restock — only the new batch gets the new price.
  // The selling price (item.price) is never part of a batch: it's a
  // single field on the item, so it's always identical across all stock
  // of that item no matter how many different purchase prices exist.
  // =====================================================================
  function ensureItemBatches(item){
    if(!item.batches){
      item.batches = item.stock>0 ? [{
        id: uid('b'), qty: item.stock,
        purchasePrice: (typeof item.purchasePrice==='number') ? item.purchasePrice : 0,
        dateISO: new Date().toISOString()
      }] : [];
    }
    if(typeof item.purchasePrice !== 'number'){
      item.purchasePrice = item.batches.length ? item.batches[item.batches.length-1].purchasePrice : 0;
    }
    return item;
  }
  // Most recently added batch's purchase price — used to prefill the
  // Restock form and as a fallback cost when a sale outsells tracked batches.
  function itemLastPurchasePrice(item){
    ensureItemBatches(item);
    if(!item.batches.length) return (typeof item.purchasePrice==='number') ? item.purchasePrice : null;
    var sorted = item.batches.slice().sort(function(a,b){ return new Date(b.dateISO)-new Date(a.dateISO); });
    return sorted[0].purchasePrice;
  }
  // Consumes `qty` units from an item's oldest batches first (FIFO),
  // decrementing item.stock and returning the total cost of the units
  // consumed — this is what Profit is calculated from. If a sale outsells
  // every tracked batch (e.g. legacy stock from before this feature), the
  // remainder is costed at the last known purchase price.
  function consumeStockFIFO(item, qty){
    ensureItemBatches(item);
    var remaining = qty, cost = 0;
    item.batches.sort(function(a,b){ return new Date(a.dateISO)-new Date(b.dateISO); });
    for(var i=0;i<item.batches.length && remaining>0;i++){
      var b = item.batches[i];
      var take = Math.min(b.qty, remaining);
      cost += take * (b.purchasePrice||0);
      b.qty -= take;
      remaining -= take;
    }
    item.batches = item.batches.filter(function(b){ return b.qty>0; });
    if(remaining>0) cost += remaining * (item.purchasePrice||0);
    item.stock = Math.max(0, item.stock - qty);
    return cost;
  }

  // =====================================================================
  // BLUETOOTH THERMAL PRINTER (ESC/POS over Web Bluetooth)
  // Most 58mm "Bluetooth" receipt printers are actually BLE (not classic
  // SPP), so the OS print dialog from window.print() never reaches them —
  // that's the usual cause of "not printing / not connecting". Instead we
  // talk to the printer directly with raw ESC/POS commands over a BLE
  // write characteristic, the same way the printer's companion app does.
  // =====================================================================
  var PRINTER_STORE_KEY = 'pos:printerName';
  var PRINTER_OPTIONAL_SERVICES = [
    '000018f0-0000-1000-8000-00805f9b34fb',
    '49535343-fe7d-4ae5-8fa9-9fafd205e455',
    '0000ffe0-0000-1000-8000-00805f9b34fb',
    '0000ff00-0000-1000-8000-00805f9b34fb',
    'e7810a71-73ae-499d-8c15-faa9aef0c3f2'
  ];

  function bluetoothSupported(){
    return !!(navigator.bluetooth && navigator.bluetooth.requestDevice);
  }

  // Shared by the initial pairing connect and every auto-reconnect attempt,
  // so both paths discover the write characteristic the same way.
  async function findWritableCharacteristic(server){
    var characteristic = null;
    var services = await server.getPrimaryServices();
    outer:
    for(var i=0;i<services.length;i++){
      var chars = await services[i].getCharacteristics();
      for(var j=0;j<chars.length;j++){
        var c = chars[j];
        if(c.properties.write || c.properties.writeWithoutResponse){
          characteristic = c;
          break outer;
        }
      }
    }
    return characteristic;
  }

  // Re-attaches to a printer we (or the browser) already have permission
  // for, without showing the device chooser again. Used both when the
  // connection drops mid-session (e.g. printer went briefly out of range)
  // and, opportunistically, right after page load if the browser kept
  // permission for a previously-paired printer. Retries a few times with
  // a short backoff since BLE reconnects sometimes fail on the first try
  // even when the printer is right there.
  var reconnecting = false;
  async function attemptAutoReconnect(device, maxAttempts){
    if(reconnecting) return false;
    reconnecting = true;
    maxAttempts = maxAttempts || 3;
    for(var i=0;i<maxAttempts;i++){
      try{
        state.printer.status = 'Reconnecting to '+(device.name||'printer')+(i>0?' (attempt '+(i+1)+')':'')+'…';
        render();
        var server = await device.gatt.connect();
        var characteristic = await findWritableCharacteristic(server);
        if(!characteristic) throw new Error('No writable characteristic found.');
        state.printer.device = device;
        state.printer.characteristic = characteristic;
        state.printer.connected = true;
        state.printer.name = device.name || 'Bluetooth printer';
        state.printer.status = 'Reconnected to '+state.printer.name+'.';
        try{ localStorage.setItem(PRINTER_STORE_KEY, state.printer.name); }catch(e){}
        requestWakeLock();
        render();
        reconnecting = false;
        return true;
      }catch(e){
        await sleep(300 + i*300);
      }
    }
    state.printer.connected = false;
    state.printer.characteristic = null;
    state.printer.status = 'Printer disconnected — tap Connect Printer to reconnect.';
    render();
    reconnecting = false;
    return false;
  }

  function watchForDrop(device){
    device.addEventListener('gattserverdisconnected', function(){
      state.printer.connected = false;
      state.printer.characteristic = null;
      // Try to reattach automatically first; only ask for a manual tap
      // if that genuinely fails (attemptAutoReconnect sets that status).
      attemptAutoReconnect(device, 3);
    });
  }

  async function connectPrinter(){
    if(!bluetoothSupported()){
      state.printer.status = 'This browser/device does not support Bluetooth printing. Use Chrome on Android, or use "Print (browser)" instead.';
      render();
      return;
    }
    try{
      state.printer.status = 'Choose your printer from the list…';
      render();
      var device = await navigator.bluetooth.requestDevice({
        acceptAllDevices: true,
        optionalServices: PRINTER_OPTIONAL_SERVICES
      });
      state.printer.status = 'Connecting to '+device.name+'…';
      render();
      var server = await device.gatt.connect();
      var characteristic = await findWritableCharacteristic(server);
      if(!characteristic) throw new Error('No writable characteristic found on this printer.');
      watchForDrop(device);
      state.printer.device = device;
      state.printer.characteristic = characteristic;
      state.printer.connected = true;
      state.printer.name = device.name || 'Bluetooth printer';
      state.printer.status = 'Connected to '+state.printer.name+'.';
      try{ localStorage.setItem(PRINTER_STORE_KEY, state.printer.name); }catch(e){}
      requestWakeLock();
      render();
    }catch(e){
      state.printer.status = 'Could not connect: '+(e.message||e);
      render();
    }
  }

  // On boot, if this browser kept Bluetooth permission for a previously
  // paired printer (Chrome on Android persists this across page loads),
  // reattach to it silently — no device chooser, no tap needed. If the
  // browser doesn't support this (e.g. permission was only session-scoped)
  // this quietly does nothing and the person just taps Connect once, same
  // as before.
  async function trySilentReconnect(){
    try{
      if(!navigator.bluetooth || !navigator.bluetooth.getDevices) return false;
      var devices = await navigator.bluetooth.getDevices();
      if(!devices || !devices.length) return false;
      var lastName = null;
      try{ lastName = localStorage.getItem(PRINTER_STORE_KEY); }catch(e){}
      var device = (lastName && devices.find(function(d){ return d.name===lastName; })) || devices[0];
      watchForDrop(device);
      return await attemptAutoReconnect(device, 2);
    }catch(e){ return false; /* fall back to manual Connect — no harm done */ }
  }

  // ---------------------------------------------------------------------
  // KEEPING BLUETOOTH ALIVE WHILE THE APP IS OPEN
  // No web app (installed or not) can hold a Bluetooth connection open
  // once the phone's screen is off or the app is fully backgrounded —
  // that's an OS/browser battery-saving rule, not something this app can
  // override. What we *can* do is make the connection as resilient as
  // possible while the app is on screen:
  //   1. A screen Wake Lock stops the display (and the JS that depends on
  //      it) from sleeping while a printer is connected.
  //   2. When the app regains focus (user switches back to it, or the
  //      screen turns back on), we immediately try to silently reattach
  //      to the last known printer instead of waiting for a print button.
  // ---------------------------------------------------------------------
  var wakeLock = null;
  async function requestWakeLock(){
    try{
      if(!('wakeLock' in navigator)) return;
      if(wakeLock) return;
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', function(){ wakeLock = null; });
    }catch(e){ /* user denied / unsupported — silently ignore */ }
  }
  function releaseWakeLock(){
    try{ if(wakeLock){ wakeLock.release(); wakeLock = null; } }catch(e){}
  }

  document.addEventListener('visibilitychange', function(){
    if(document.visibilityState === 'visible'){
      if(state.printer.connected) requestWakeLock();
      if(!state.printer.connected && state.printer.device && !reconnecting){
        attemptAutoReconnect(state.printer.device, 2);
      }
    } else {
      // Screen lock / app switch — nothing more we can do here; the BLE
      // link will likely drop and gattserverdisconnected (see
      // watchForDrop) will fire the moment it does, or on return.
      releaseWakeLock();
    }
  });

  function disconnectPrinter(){

    // listener (fired by device.gatt.disconnect() below) doesn't try to
    // auto-reconnect right back to the printer the person just chose to drop.
    reconnecting = true;
    try{ if(state.printer.device && state.printer.device.gatt.connected) state.printer.device.gatt.disconnect(); }catch(e){}
    state.printer.connected = false;

  // ---- ESC/POS buffer building ----
  var ESC = 0x1B, GS = 0x1D;
  function textToBytes(str){
    var bytes = [];
    for(var i=0;i<str.length;i++){
      var code = str.charCodeAt(i);
      bytes.push(code>255 ? 63 : code); // 63 = '?' fallback for unsupported chars
    }
    return bytes;
  }
  function padLine(left, right, width){
    var space = width - String(left).length - String(right).length;
    if(space<1) space=1;
    return left + new Array(space+1).join(' ') + right;
  }
  function wrapText(str, width){
    var words = String(str).split(' ');
    var lines = [], cur = '';
    words.forEach(function(w){
      if((cur+' '+w).trim().length > width){ lines.push(cur.trim()); cur = w; }
      else cur = (cur+' '+w).trim();
    });
    if(cur) lines.push(cur);
    return lines.length ? lines : [''];
  }

  // Cache of the last-computed logo bitmap, keyed by source image + width —
  // the shop logo almost never changes between prints, so re-decoding the
  // image and re-dithering every pixel on every single receipt was wasted
  // work that added noticeable delay before the print even started.
  var logoBytesCache = { key:'', bytes:null };

  // Convert an uploaded logo image into ESC/POS raster bitmap bytes (GS v 0),
  // dithered to 1-bit black/white at the printer's dot width.
  function logoToEscPosBytes(dataUrl, printWidthPx){
    return new Promise(function(resolve){
      if(!dataUrl) return resolve([]);
      var cacheKey = dataUrl+'|'+printWidthPx;
      if(logoBytesCache.key===cacheKey){ resolve(logoBytesCache.bytes); return; }
      var img = new Image();
      img.onload = function(){
        var scale = printWidthPx / img.width;
        var h = Math.max(1, Math.round(img.height*scale));
        var wBytes = Math.ceil(printWidthPx/8);
        var wPacked = wBytes*8;
        var canvas = document.createElement('canvas');
        canvas.width = wPacked; canvas.height = h;
        var ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff'; ctx.fillRect(0,0,wPacked,h);
        ctx.drawImage(img, 0, 0, printWidthPx, h);
        var data = ctx.getImageData(0,0,wPacked,h).data;
        var bytes = [0x1D,0x76,0x30,0x00, wBytes&0xFF, (wBytes>>8)&0xFF, h&0xFF, (h>>8)&0xFF];
        for(var y=0;y<h;y++){
          for(var xB=0;xB<wBytes;xB++){
            var b=0;
            for(var bit=0;bit<8;bit++){
              var x=xB*8+bit, idx=(y*wPacked+x)*4;
              var lum = data[idx]*0.299+data[idx+1]*0.587+data[idx+2]*0.114;
              if(data[idx+3]>128 && lum<160) b |= (0x80>>bit);
            }
            bytes.push(b);
          }
        }
        logoBytesCache.key = cacheKey;
        logoBytesCache.bytes = bytes;
        resolve(bytes);
      };
      img.onerror = function(){ resolve([]); };
      img.src = dataUrl;
    });
  }


  async function buildReceiptBytes(bill){
    var width = state.shop.width==='58' ? 32 : 42; // chars per line, normal size font
    var printWidthPx = state.shop.width==='58' ? 384 : 576;
    var out = [];
    function push(){ for(var i=0;i<arguments.length;i++) out.push(arguments[i]); }
    function pushArr(arr){ for(var i=0;i<arr.length;i++) out.push(arr[i]); }
    function line(str){ push.apply(null, textToBytes(str)); push(0x0A); }
    function center(on){ push(ESC,0x61,on?1:0); }
    function bold(on){ push(ESC,0x45,on?1:0); }
    function bigSize(on){ push(GS,0x21, on?0x11:0x00); }

    push(ESC,0x40); // initialize printer
    center(true);
    bold(true); bigSize(true);
    line(state.shop.name);
    bigSize(false); bold(false);
    if(state.shop.address) wrapText(state.shop.address, width).forEach(line);
    if(state.shop.phone) line(state.shop.phone);
    center(false);
    line(new Array(width+1).join('-'));
    line(padLine('Bill No', bill.no, width));
    line(padLine('Date', new Date(bill.dateISO).toLocaleString(), width));
    if(bill.customerName) wrapText('Customer: '+bill.customerName, width).forEach(line);
    if(bill.customerPhone) line(padLine('Phone', bill.customerPhone, width));
    if(bill.customerAddress) wrapText('Address: '+bill.customerAddress, width).forEach(line);
    line(new Array(width+1).join('-'));
    bill.items.forEach(function(it){
      wrapText(it.name, width).forEach(line);
      line(padLine(it.qty+' x '+money(it.price), money(it.price*it.qty), width));
    });
    line(new Array(width+1).join('-'));
    line(padLine('Subtotal', money(bill.subtotal), width));
    line(padLine('Discount', '-'+money(bill.discount), width));
    bold(true);
    line(padLine('TOTAL', money(bill.total), width));
    bold(false);
    line(padLine('Payment', bill.payment.toUpperCase()+(bill.chequeNo?' #'+bill.chequeNo:''), width));
    if(bill.payment==='account'){
      bold(true);
      line(padLine('Balance Due', money(billBalance(bill)), width));
      bold(false);
    }
    line(new Array(width+1).join('-'));
    center(true);
    if(state.shop.footer) wrapText(state.shop.footer, width).forEach(line);
    push(0x0A,0x0A,0x0A);
    push(GS,0x56,0x42,0x00); // partial cut (ignored harmlessly if unsupported)
    return new Uint8Array(out);
  }

  function sleep(ms){ return new Promise(function(res){ setTimeout(res, ms); }); }

  async function writeToPrinter(bytes){
    var ch = state.printer.characteristic;
    if(!ch) throw new Error('No printer connected.');
    var withoutResponse = ch.properties.writeWithoutResponse;
    var i = 0;
    while(i < bytes.length){
      var chunkSize = state.printer.writeChunk;
      var chunk = bytes.slice(i, i+chunkSize);
      try{
        if(withoutResponse){
          await ch.writeValueWithoutResponse(chunk);
          // No ack from the printer, so we still pace writes to avoid
          // overrunning its buffer — but 8ms keeps up with modern printers
          // fine and roughly halves total print time vs the old 20ms.
          await sleep(8);
        } else {
          await ch.writeValue(chunk); // this already waits for the printer's ack, so it's naturally paced — no extra sleep needed
        }
        i += chunkSize;
      }catch(e){
        // This chunk was likely too large for this printer's BLE buffer/MTU.
        // Shrink the chunk size and retry the same bytes instead of failing
        // the whole print — and remember the smaller size so the rest of
        // this print, and future ones, don't hit the same wall repeatedly.
        if(state.printer.writeChunk > 20){
          state.printer.writeChunk = Math.max(20, Math.floor(state.printer.writeChunk/2));
        } else {
          throw e;
        }
      }
    }
  }

  async function printBillToBluetooth(bill){
    if(!state.printer.connected){
      if(state.printer.device){
        var reattached = await attemptAutoReconnect(state.printer.device, 2);
        if(!reattached) return false; // status already set by attemptAutoReconnect
      } else {
        // No device tracked in this page session (e.g. the page was
        // reloaded) — before giving up, check whether the browser still
        // remembers permission for a previously paired printer and try
        // reattaching to that silently.
        var reconnectedSilently = await trySilentReconnect();
        if(!reconnectedSilently || !state.printer.connected){
          state.printer.status = 'No Bluetooth printer connected — tap "Connect Printer" first.';
          render();
          return false;
        }
      }
    }
    try{
      state.printer.status = 'Printing…';
      render();
      var bytes = await buildReceiptBytes(bill);
      await writeToPrinter(bytes);
      state.printer.status = 'Printed to '+state.printer.name+'.';
      render();
      return true;
    }catch(e){
      state.printer.status = 'Print failed: '+(e.message||e)+'. Try reconnecting the printer.';
      render();
      return false;
    }
  }

  // =====================================================================
  // BILL PHOTO SHARE
  // Draws the same receipt content shown on-screen onto a plain <canvas>
  // (no external libraries needed), turns that into a PNG, and hands it to
  // the OS share sheet (WhatsApp, SMS, etc.) via the Web Share API. Falls
  // back to just downloading the PNG on browsers/devices that can't share
  // files (e.g. desktop Chrome, iOS Safari without file share support).
  // =====================================================================
  function billToCanvas(bill){
    var scale = 2; // render at 2x for a crisp image
    var w = 380;
    var pad = 18;
    var lineH = 20;
    var items = bill.items || [];
    // Rough height estimate: header block + one line per item + totals block + footer
    var lines = 8 + items.length + 8 +
      (bill.payment==='account' ? 1 : 0) +
      (bill.customerName ? 1 : 0) + (bill.customerPhone ? 1 : 0) + (bill.customerAddress ? 1 : 0);
    var h = pad*2 + lines*lineH + 30;
    var canvas = document.createElement('canvas');
    canvas.width = w*scale; canvas.height = h*scale;
    var ctx = canvas.getContext('2d');
    ctx.scale(scale, scale);
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(0,0,w,h);
    ctx.fillStyle = '#111111';
    ctx.textBaseline = 'top';
    var y = pad;
    function center(text, size, bold){
      ctx.font = (bold?'700 ':'')+size+'px monospace';
      var tw = ctx.measureText(text).width;
      ctx.fillText(text, (w-tw)/2, y);
      y += lineH;
    }
    function row(left, right, bold){
      ctx.font = (bold?'700 ':'')+'12px monospace';
      ctx.fillText(left, pad, y);
      var rw = ctx.measureText(right).width;
      ctx.fillText(right, w-pad-rw, y);
      y += lineH;
    }
    function hr(){
      ctx.strokeStyle = '#999999';
      ctx.setLineDash([2,2]);
      ctx.beginPath(); ctx.moveTo(pad, y+6); ctx.lineTo(w-pad, y+6); ctx.stroke();
      ctx.setLineDash([]);
      y += 14;
    }
    center(state.shop.name, 15, true);
    if(state.shop.address) center(state.shop.address, 11, false);
    if(state.shop.phone) center(state.shop.phone, 11, false);
    hr();
    row('Bill No', bill.no);
    row('Date', new Date(bill.dateISO).toLocaleString());
    hr();
    items.forEach(function(it){
      row(it.name+' x'+it.qty, money(it.price*it.qty));
    });
    hr();
    row('Subtotal', money(bill.subtotal));
    row('Discount', '-'+money(bill.discount));
    row('TOTAL', money(bill.total), true);
    row('Payment', bill.payment.toUpperCase()+(bill.chequeNo?' #'+bill.chequeNo:''));
    if(bill.payment==='account') row('Balance Due', money(billBalance(bill)), true);
    if(bill.customerName) row('Customer', bill.customerName);
    if(bill.customerPhone) row('Phone', bill.customerPhone);
    if(bill.customerAddress) row('Address', bill.customerAddress);
    hr();
    if(state.shop.footer) center(state.shop.footer, 11, false);
    return canvas;
  }

  async function shareBillImage(bill){
    if(!bill) return;
    var canvas;
    try{ canvas = billToCanvas(bill); }
    catch(e){ alert('Could not create the bill image: '+(e.message||e)); return; }
    canvas.toBlob(async function(blob){
      if(!blob){ alert('Could not create the bill image.'); return; }
      var fileName = 'bill-'+bill.no+'.png';
      var file = null;
      try{ file = new File([blob], fileName, {type:'image/png'}); }catch(e){ /* File ctor unsupported */ }
      if(file && navigator.canShare && navigator.canShare({files:[file]})){
        try{
          await navigator.share({files:[file], title:'Bill '+bill.no, text: state.shop.name+' — Bill '+bill.no});
          return;
        }catch(e){
          if(e && e.name==='AbortError') return; // user cancelled the share sheet
          // fall through to download
        }
      }
      // Fallback: just download the PNG so it can be shared manually.
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = fileName;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(url); }, 4000);
    }, 'image/png');
  }

  async function storageGet(key){
    if(!sheetConfigured()) return null;
    try{
      var res = await fetch(CONFIG.SHEET_API_URL+'?action=get&key='+encodeURIComponent(key));
      if(!res.ok) throw new Error('HTTP '+res.status);
      var data = await res.json();
      return data.value ? JSON.parse(data.value) : null;
    }catch(e){ state.storageOk=false; return null; }
  }
  async function storageSet(key, val){
    if(!sheetConfigured()) return false;
    try{
      var res = await fetch(CONFIG.SHEET_API_URL, {
        method:'POST',
        headers:{'Content-Type':'text/plain;charset=utf-8'}, // avoids CORS preflight, Apps Script can't handle OPTIONS
        body: JSON.stringify({ key:key, value: JSON.stringify(val) })
      });
      if(!res.ok) throw new Error('HTTP '+res.status);
      // Apps Script returns a JSON body on success; if it can't be parsed
      // (e.g. an HTML error/login page came back instead), treat it as a
      // failure rather than silently reporting success.
      var text = await res.text();
      try{
        var data = JSON.parse(text);
        if(data && data.error) throw new Error(data.error);
      }catch(parseErr){
        if(parseErr instanceof SyntaxError) throw new Error('Unexpected response from Sheet API (not JSON) — check the Apps Script deployment/authorization.');
        throw parseErr;
      }
      state.storageOk = true;
      return true;
    }catch(e){
      state.storageOk=false;
      state.storageErr = (e && e.message) || 'Save failed';
      return false;
    }
  }

  async function boot(){
    // Paint the Admin/Cashier picker right away — it doesn't need any
    // fetched data to display, so there's no reason to make the person
    // stare at a blank screen while these requests are still in flight.
    render();
    // Fire all 4 reads in parallel instead of one-by-one — Apps Script
    // requests are slow (often 1-3s each), so awaiting them sequentially
    // could take 4x as long as it needs to.
    var results = await Promise.all([
      storageGet(STORE_KEY_ITEMS),
      storageGet(STORE_KEY_USERS),
      storageGet(STORE_KEY_BILLS),
      storageGet(STORE_KEY_SHOP)
    ]);
    var items = results[0], users = results[1], bills = results[2], shop = results[3];
    if(!items || !users){
      seedDefaults();
      await Promise.all([
        storageSet(STORE_KEY_ITEMS, state.items),
        storageSet(STORE_KEY_USERS, state.users),
        storageSet(STORE_KEY_BILLS, state.bills),
        storageSet(STORE_KEY_SHOP, state.shop)
      ]);
    } else {
      state.items = items;
      state.users = users;
      state.bills = bills || [];
      if(shop) state.shop = shop;
    }
    // Backfill batches for items saved before purchase-price tracking existed.
    state.items.forEach(ensureItemBatches);
    try{
      var lastPrinter = localStorage.getItem(PRINTER_STORE_KEY);
      if(lastPrinter) state.printer.status = 'Last used: '+lastPrinter+'. Reconnecting…';
    }catch(e){}
    state.booted = true;
    render();
    syncReadableSheets();
    // Fire-and-forget: try to silently reattach to the last printer without
    // blocking the rest of boot. If the browser didn't keep permission, this
    // no-ops and the status message below just falls back to "tap Connect".
    trySilentReconnect().then(function(){
      if(!state.printer.connected && !state.printer.device){
        try{
          var lp = localStorage.getItem(PRINTER_STORE_KEY);
          if(lp) state.printer.status = 'Last used: '+lp+'. Tap Connect to reconnect.';
        }catch(e){}
        render();
      }
    });
  }

  async function persist(key){
    var ok;
    if(key==='items') ok = await storageSet(STORE_KEY_ITEMS, state.items);
    if(key==='users') ok = await storageSet(STORE_KEY_USERS, state.users);
    if(key==='bills') ok = await storageSet(STORE_KEY_BILLS, state.bills);
    if(key==='shop') ok = await storageSet(STORE_KEY_SHOP, state.shop);
    // Fire-and-forget: also mirror the data into separate, human-readable
    // tabs in the same Google Sheet (Bills, Shop Details, Customers, Stock,
    // Daily Sales, Profit, Cash In Hand). This never blocks the UI and a
    // failure here never affects the app's own working data above.
    if(ok) syncReadableSheets();
    return ok;
  }

  // ---------------- READABLE SHEET TABS (mirror) ----------------
  var sheetSyncInFlight = false;
  function syncReadableSheets(){
    if(!sheetConfigured()) return;
    if(sheetSyncInFlight) return; // last write wins is fine; just avoid piling up requests
    sheetSyncInFlight = true;
    Promise.all([
      storageSyncTab('Bills', BILLS_HEADERS, buildBillsRows()),
      storageSyncTab('Shop Details', SHOP_HEADERS, buildShopRows()),
      storageSyncTab('Customers', CUSTOMERS_HEADERS, buildCustomersRows()),
      storageSyncTab('Stock', STOCK_HEADERS, buildStockRows()),
      storageSyncTab('Daily Sales', DAILY_SALES_HEADERS, buildDailySalesRows()),
      storageSyncTab('Profit', PROFIT_HEADERS, buildProfitRows()),
      storageSyncTab('Cash In Hand', CASH_HEADERS, buildCashInHandRows()),
      storageSyncTab('Logo', LOGO_HEADERS, buildLogoRows())
    ]).catch(function(){}).then(function(){ sheetSyncInFlight = false; });
  }

  async function storageSyncTab(sheetName, headers, rows){
    if(!sheetConfigured()) return false;
    try{
      var res = await fetch(CONFIG.SHEET_API_URL, {
        method:'POST',
        headers:{'Content-Type':'text/plain;charset=utf-8'}, // avoids CORS preflight
        body: JSON.stringify({ action:'syncTab', sheet:sheetName, headers:headers, rows:rows })
      });
      if(!res.ok) throw new Error('HTTP '+res.status);
      var text = await res.text();
      var data = JSON.parse(text);
      if(data && data.error) throw new Error(data.error);
      return true;
    }catch(e){ return false; } // mirror tabs are non-critical — app keeps working either way
  }

  var CUSTOMERS_HEADERS = ['Customer Name','Phone','Address','Total Bills','Total Spent','Balance Owing','Last Purchase Date'];
  function buildCustomersRows(){
    var map = {};
    state.bills.forEach(function(b){
      var name = (b.customerName||'').trim();
      if(!name) return;
      var key = name.toLowerCase()+'|'+(b.customerPhone||'').trim();
      if(!map[key]) map[key] = {name:name, phone:b.customerPhone||'', address:b.customerAddress||'', bills:0, spent:0, balance:0, last:b.dateISO};
      var c = map[key];
      c.bills += 1;
      c.spent += b.total||0;
      c.balance += billBalance(b);
      if(b.customerAddress) c.address = b.customerAddress;
      if(new Date(b.dateISO) > new Date(c.last)) c.last = b.dateISO;
    });
    return Object.keys(map).map(function(k){
      var c = map[k];
      return [c.name, c.phone, c.address, c.bills, Math.round(c.spent*100)/100, Math.round(c.balance*100)/100, new Date(c.last).toLocaleDateString()];
    });
  }

  var STOCK_HEADERS = ['Item Name','Category','Selling Price','Purchase Price','Current Stock','Status'];

    return state.items.map(function(it){

  var DAILY_SALES_HEADERS = ['Date','Bills Count','Total Sales','Total Discount','Cash Sales','Cheque Sales','Account Sales'];
  function buildDailySalesRows(){
    var map = {};
    state.bills.forEach(function(b){
      var day = (b.dateISO||'').slice(0,10);
      if(!day) return;
      if(!map[day]) map[day] = {date:day, bills:0, sales:0, discount:0, cash:0, cheque:0, account:0};
      var e = map[day];
      e.bills += 1;
      e.sales += b.total||0;
      e.discount += b.discount||0;
      if(b.payment==='cash') e.cash += b.total||0;
      else if(b.payment==='cheque') e.cheque += b.total||0;
      else if(b.payment==='account') e.account += b.total||0;
    });
    return Object.keys(map).sort().reverse().map(function(k){
      var e = map[k];
      return [e.date, e.bills, Math.round(e.sales*100)/100, Math.round(e.discount*100)/100, Math.round(e.cash*100)/100, Math.round(e.cheque*100)/100, Math.round(e.account*100)/100];
    });
  }

  var PROFIT_HEADERS = ['Date','Bills Count','Revenue','Cost (COGS)','Profit','Margin %'];
  function buildProfitRows(){
    return groupProfitByDay(state.bills).map(function(r){
      var margin = r.revenue>0 ? (r.profit/r.revenue*100) : 0;
      return [r.key, r.bills, Math.round(r.revenue*100)/100, Math.round(r.cost*100)/100, Math.round(r.profit*100)/100, Math.round(margin*100)/100];
    });
  }

  var CASH_HEADERS = ['Date','Cash Sales','Cash Received (Account Payments)','Total Cash In Hand'];
  function buildCashInHandRows(){
    var map = {};
    function ensure(day){ if(!map[day]) map[day] = {date:day, cash:0, received:0}; return map[day]; }
    state.bills.forEach(function(b){
      var day = (b.dateISO||'').slice(0,10);
      if(!day) return;
      if(b.payment==='cash') ensure(day).cash += b.total||0;
    });
    state.bills.forEach(function(b){
      (b.payments||[]).forEach(function(p){
        var day = (p.dateISO||'').slice(0,10);
        if(!day) return;
        ensure(day).received += p.amount||0;
      });
    });
    return Object.keys(map).sort().reverse().map(function(k){
      var e = map[k];
      var total = e.cash + e.received;
      return [e.date, Math.round(e.cash*100)/100, Math.round(e.received*100)/100, Math.round(total*100)/100];
    });
  }

  // Google Sheets caps a single cell at 50,000 characters, and a resized
  // logo's base64 data URL can be longer than that — so it's split into
  // multiple "Logo Data Part N" rows, each safely under the limit, and
  // reassembled (Part 1 + Part 2 + ...) if you ever need to recover the image.
  var LOGO_HEADERS = ['Field','Value'];
  function buildLogoRows(){
    var s = state.shop||{};
    var logo = s.logo||'';
    if(!logo) return [['Logo Present','No']];
    var rows = [['Logo Present','Yes']];
    var fmtMatch = /^data:image\/([a-zA-Z0-9.+-]+);base64,/.exec(logo);
    rows.push(['Format', fmtMatch ? fmtMatch[1].toUpperCase() : 'Unknown']);
    var approxKB = Math.round(logo.length*3/4/1024*10)/10;
    rows.push(['Approx Size (KB)', approxKB]);
    var chunkSize = 40000;
    var totalParts = Math.ceil(logo.length/chunkSize) || 1;
    rows.push(['Data Parts', totalParts]);
    for(var i=0;i<totalParts;i++){
      rows.push(['Logo Data Part '+(i+1), logo.substr(i*chunkSize, chunkSize)]);
    }
    return rows;
  }

    // position) across the re-render, so full-string re-render doesn't
    // knock the keyboard/cursor away on phones.
    var active = document.activeElement;
    var focusId = (active && active.id) ? active.id : null;
    var selStart = null, selEnd = null;
    if(focusId && active && typeof active.selectionStart === 'number'){
      try{ selStart = active.selectionStart; selEnd = active.selectionEnd; }catch(e){}
    }
    app.innerHTML = renderShell() + (state.busyMsg ? renderBusyOverlay() : '');
    bindShell();
    if(focusId){
      var el = document.getElementById(focusId);
      if(el){
        el.focus();
        if(selStart!=null && el.setSelectionRange){
          try{ el.setSelectionRange(selStart, selEnd); }catch(e){}
        }
      }
    }
  }

  function escapeHtml(s){ return String(s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }

  // Display label for a role. The stored role value itself stays 'cashier'
  // (existing users/bills/permissions all key off it) — this only changes

  function roleLabel(role){ return role==='admin' ? 'Admin' : (state.shop.repLabel || 'Sales Rep'); }

  // Resize/compress an uploaded image file to a small JPEG data URL so it's
  // cheap to store (localStorage/Sheet) and quick to send to the printer.
  // keepTransparent=true skips the white background fill and saves as PNG
  // instead of JPEG, so a logo with a transparent background doesn't end
  // up with a white box behind it. Product photos still default to a
  // white-filled JPEG (smaller file size, no transparency needed).
  function resizeImageFile(file, maxDim, cb, keepTransparent){
    if(!file) return cb(null);
    var reader = new FileReader();
    reader.onload = function(e){
      var img = new Image();
      img.onload = function(){
        var scale = Math.min(1, maxDim / Math.max(img.width, img.height));
        var w = Math.max(1, Math.round(img.width*scale));
        var h = Math.max(1, Math.round(img.height*scale));
        var canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        var ctx = canvas.getContext('2d');
        if(!keepTransparent){
          ctx.fillStyle = '#FFFFFF';
          ctx.fillRect(0,0,w,h);
        }
        ctx.drawImage(img, 0, 0, w, h);
        cb(keepTransparent ? canvas.toDataURL('image/png') : canvas.toDataURL('image/jpeg', 0.82));
      };
      img.onerror = function(){ cb(null); };
      img.src = e.target.result;
    };
    reader.onerror = function(){ cb(null); };
    reader.readAsDataURL(file);
  }

  // Re-renders just one DOM region instead of the whole page, and restores
  // focus/cursor position into it afterwards if the user was typing there.
  function refreshRegion(container, htmlFn, bindFn){
    if(!container) return;
    var active = document.activeElement;
    var focusId = (active && active.id && container.contains(active)) ? active.id : null;
    var selStart = null, selEnd = null;
    if(focusId && typeof active.selectionStart === 'number'){
      try{ selStart = active.selectionStart; selEnd = active.selectionEnd; }catch(e){}
    }
    container.innerHTML = htmlFn();
    bindFn();
    if(focusId){
      var el = document.getElementById(focusId);
      if(el){
        el.focus();
        if(selStart!=null && el.setSelectionRange){ try{ el.setSelectionRange(selStart, selEnd); }catch(e){} }
      }
    }
  }

  function refreshItemGrid(){
    refreshRegion(document.getElementById('item-grid'), renderItemTilesHtml, bindItemGridEvents);
  }
  function refreshCartBody(){
    refreshRegion(document.getElementById('cart-body'), renderCartBodyHtml, bindCartBodyEvents);
  }
  var refreshItemGridDebounced = debounce(refreshItemGrid, 120);
  var refreshCartBodyDebounced = debounce(refreshCartBody, 120);

  // Builds a lookup of previously-used customers from bill history, indexed
  // both by lowercased trimmed name and by phone, so we can autofill the
  // other fields for a repeat customer no matter which field they type
  // first. Bills are iterated in the order they happened, so later bills
  // naturally overwrite earlier ones — the most recent details win.
  function getCustomerDirectory(){
    var byName = {}, byPhone = {};
    state.bills.forEach(function(b){
      var name = (b.customerName||'').trim();
      var phone = (b.customerPhone||'').trim();
      var record = {name:name, phone:phone, address:(b.customerAddress||'').trim()};
      if(name) byName[name.toLowerCase()] = record;
      if(phone) byPhone[phone.toLowerCase()] = record;
    });
    return {byName:byName, byPhone:byPhone};
  }
  function lookupCustomerByName(name){
    var n = (name||'').trim().toLowerCase();
    if(!n) return null;
    return getCustomerDirectory().byName[n] || null;
  }
  function lookupCustomerByPhone(phone){
    var p = (phone||'').trim().toLowerCase();
    if(!p) return null;
    return getCustomerDirectory().byPhone[p] || null;
  }

  function billPaidTotal(b){ return (b.payments||[]).reduce(function(s,p){ return s+p.amount; },0); }
  function billBalance(b){
    if(b.payment!=='account') return 0;
    return Math.round((b.total - billPaidTotal(b))*100)/100;
  }
  function billStatus(b){
    if(b.payment!=='account') return 'paid';
    var bal = billBalance(b);
    if(bal<=0.004) return 'paid';
    if(billPaidTotal(b)>0) return 'partial';
    return 'unpaid';
  }

  function currentTotals(){
    var subtotal = state.cart.reduce(function(s,c){ return s+c.price*c.qty; },0);
    var discount = state.discountType==='percent' ? subtotal*(state.discountVal/100) : Number(state.discountVal||0);
    discount = Math.min(discount, subtotal);
    return {subtotal:subtotal, discount:discount, total:subtotal-discount};
  }

  function bindBillingEvents(){
    var search = document.getElementById('item-search');
    if(search) search.addEventListener('input', function(e){ state.itemSearch = e.target.value; refreshItemGridDebounced(); });
    bindItemGridEvents();
    bindCartBodyEvents();

  // Only re-binds the tiles inside #item-grid — safe to call after
  // refreshItemGrid() replaces just that region's innerHTML.
  function bindItemGridEvents(){
    document.querySelectorAll('[data-add]').forEach(function(btn){
      btn.addEventListener('click', function(){
        var id = btn.getAttribute('data-add');
        var item = state.items.find(function(i){ return i.id===id; });
        if(!item || item.stock<=0) return;
        var existing = state.cart.find(function(c){ return c.id===id; });
        var inCart = existing ? existing.qty : 0;
        if(inCart>=item.stock) return;
        if(existing) existing.qty++;
        else state.cart.push({id:item.id, name:item.name, price:item.price, qty:1});
        refreshCartBody();
      });
    });
  }

  // Only re-binds controls inside #cart-body — safe to call after
  // refreshCartBody() replaces just that region's innerHTML.
  function bindCartBodyEvents(){
    document.querySelectorAll('[data-qty]').forEach(function(btn){
      btn.addEventListener('click', function(){
        var id = btn.getAttribute('data-id');
        var delta = Number(btn.getAttribute('data-qty'));
        var line = state.cart.find(function(c){ return c.id===id; });
        var item = state.items.find(function(i){ return i.id===id; });
        if(!line) return;
        var newQty = line.qty + delta;
        if(newQty<=0){ state.cart = state.cart.filter(function(c){ return c.id!==id; }); }
        else if(item && newQty>item.stock){ /* cap at stock */ }
        else { line.qty = newQty; }
        refreshCartBody();
      });
    });

    document.querySelectorAll('[data-remove]').forEach(function(btn){
      btn.addEventListener('click', function(){
        var id = btn.getAttribute('data-remove');
        state.cart = state.cart.filter(function(c){ return c.id!==id; });
        refreshCartBody();
      });
    });

    var dt = document.getElementById('disc-type');
    if(dt) dt.addEventListener('change', function(e){ state.discountType = e.target.value; refreshCartBody(); });
    var dv = document.getElementById('disc-val');
    if(dv) dv.addEventListener('input', function(e){ state.discountVal = e.target.value; refreshCartBodyDebounced(); });

    document.querySelectorAll('[data-pay]').forEach(function(btn){
      btn.addEventListener('click', function(){ state.payment = btn.getAttribute('data-pay'); refreshCartBody(); });
    });
    var cq = document.getElementById('cheque-no');
    if(cq) cq.addEventListener('input', function(e){ state.chequeNo = e.target.value; });
    var apn = document.getElementById('acct-paid-now');
    if(apn) apn.addEventListener('input', function(e){ state.accountPaidNow = e.target.value; });
    // Builds a de-duplicated, name-filtered list of previous customers for
    // the tap-to-select dropdown under the "Customer name" field.
    function buildCustomerSuggestions(query){
      var dir = getCustomerDirectory();
      var q = (query||'').trim().toLowerCase();
      var seen = {}, list = [];
      Object.keys(dir.byName).forEach(function(k){
        var r = dir.byName[k];
        if(!r.name) return;
        if(q && r.name.toLowerCase().indexOf(q)<0) return;
        if(seen[r.name.toLowerCase()]) return;
        seen[r.name.toLowerCase()] = true;
        list.push(r);
      });
      list.sort(function(a,b){ return a.name.localeCompare(b.name); });
      return list.slice(0, 30);
    }
    function renderCustSuggestList(query){
      var box = document.getElementById('cust-suggest-list');
      if(!box) return;
      var list = buildCustomerSuggestions(query);
      if(!list.length){ box.style.display='none'; box.innerHTML=''; return; }
      box.innerHTML = list.map(function(r){
        return '<div class="cust-suggest-item" data-cust-name="'+escapeHtml(r.name)+'" data-cust-phone="'+escapeHtml(r.phone||'')+'" data-cust-address="'+escapeHtml(r.address||'')+'">'+
          '<div class="nm">'+escapeHtml(r.name)+'</div>'+
          (r.phone ? '<div class="ph">'+escapeHtml(r.phone)+'</div>' : '')+
        '</div>';
      }).join('');
      box.style.display='block';
      box.querySelectorAll('[data-cust-name]').forEach(function(row){
        // mousedown (not click) fires before the input's blur hides the
        // list, and preventDefault keeps focus so nothing gets lost.
        row.addEventListener('mousedown', function(e){
          e.preventDefault();
          state.customerName = row.getAttribute('data-cust-name');
          state.customerPhone = row.getAttribute('data-cust-phone') || state.customerPhone;
          state.customerAddress = row.getAttribute('data-cust-address') || state.customerAddress;
          var cnEl = document.getElementById('cust-name'); if(cnEl) cnEl.value = state.customerName;
          var cpEl = document.getElementById('cust-phone'); if(cpEl) cpEl.value = state.customerPhone;
          var caEl = document.getElementById('cust-address'); if(caEl) caEl.value = state.customerAddress;
          box.style.display='none';
        });
      });
    }
    var cn = document.getElementById('cust-name');
    if(cn) cn.addEventListener('input', function(e){
      state.customerName = e.target.value;
      renderCustSuggestList(state.customerName);
      var match = lookupCustomerByName(state.customerName);
      if(match){
        var cpEl = document.getElementById('cust-phone');
        var caEl = document.getElementById('cust-address');
        if(!state.customerPhone.trim() && match.phone){
          state.customerPhone = match.phone;
          if(cpEl) cpEl.value = match.phone;
        }
        if(!state.customerAddress.trim() && match.address){
          state.customerAddress = match.address;
          if(caEl) caEl.value = match.address;
        }
      }
    });
    if(cn) cn.addEventListener('focus', function(){ renderCustSuggestList(state.customerName); });
    if(cn) cn.addEventListener('blur', function(){
      setTimeout(function(){ var box = document.getElementById('cust-suggest-list'); if(box) box.style.display='none'; }, 150);
    });
    var cp = document.getElementById('cust-phone');
    if(cp) cp.addEventListener('input', function(e){
      state.customerPhone = e.target.value;
      var match = lookupCustomerByPhone(state.customerPhone);
      if(match){
        var cnEl = document.getElementById('cust-name');
        var caEl = document.getElementById('cust-address');
        if(!state.customerName.trim() && match.name){
          state.customerName = match.name;
          if(cnEl) cnEl.value = match.name;
        }
        if(!state.customerAddress.trim() && match.address){
          state.customerAddress = match.address;
          if(caEl) caEl.value = match.address;
        }
      }
    });
    var ca = document.getElementById('cust-address');
    if(ca) ca.addEventListener('input', function(e){ state.customerAddress = e.target.value; });

    var complete = document.getElementById('complete-bill');
    if(complete) complete.addEventListener('click', completeBill);
    var pStatus = document.getElementById('cart-printer-status');
    if(pStatus) pStatus.addEventListener('click', function(){ state.printerModalOpen = true; render(); });
  }

  // Guards completeBill against a second tap landing while the first bill
  // is still being saved/printed — the button also gets disabled the
  // instant it's tapped, but this flag is the real safety net since the
  // button element itself may briefly still be in the DOM.
  var billSubmitInProgress = false;

  async function completeBill(){
    if(billSubmitInProgress) return;
    if(state.cart.length===0) return;
    if(state.payment==='account' && !state.customerName.trim()){
      alert('Customer name is required for "on account" sales.');
      return;
    }
    billSubmitInProgress = true;
    var btn = document.getElementById('complete-bill');
    if(btn){ btn.disabled = true; btn.textContent = 'Processing…'; }
    try{
      var totals = currentTotals();
      // For cash/cheque sales the full amount is settled immediately. For
      // "account" (credit) sales, whatever is entered in "amount received
      // now" is recorded as a payment and the rest becomes the balance due,
      // tracked on the Accounts page.
      var paidNow = state.payment==='account'
        ? Math.max(0, Math.min(totals.total, Math.round((Number(state.accountPaidNow)||0)*100)/100))
        : totals.total;
      var bill = {
        id: uid('bill'),
        no: (state.shop.billPrefix||'AJ')+String((parseInt(state.shop.billStart,10)||1)+state.bills.length).padStart(4,'0'),
        dateISO: new Date().toISOString(),
        cashier: state.currentUser.name,
        items: state.cart.map(function(c){
          var item = state.items.find(function(i){ return i.id===c.id; });
          // Consuming stock here (instead of in the loop below) also
          // records the exact cost of the batches this sale drew from,
          // so profit stays accurate even if purchase prices change later.
          var cost = item ? consumeStockFIFO(item, c.qty) : 0;
          return {name:c.name, price:c.price, qty:c.qty, cost:cost};
        }),
        subtotal: totals.subtotal,
        discount: totals.discount,
        total: totals.total,
        payment: state.payment,
        chequeNo: state.payment==='cheque' ? state.chequeNo : '',
        customer: state.payment==='account' ? state.customerName : '', // kept for backward compatibility
        customerName: state.customerName.trim(),
        customerPhone: state.customerPhone.trim(),
        customerAddress: state.customerAddress.trim(),
        payments: paidNow>0 ? [{id:uid('pay'), dateISO:new Date().toISOString(), amount:paidNow, note:'Payment at time of sale'}] : []
      };
      state.bills.push(bill);
      await Promise.all([ persist('items'), persist('bills') ]);
      state.lastBill = bill;
      state.cart = [];
      state.discountVal = 0;
      state.chequeNo = '';
      state.customerName = '';
      state.customerPhone = '';
      state.customerAddress = '';
      state.accountPaidNow = 0;
      state.showReceipt = true;
      render();
      if(printingEnabled()){
        if(state.printer.connected){
          await printBillToBluetooth(bill);
        } else {
          // Give the browser a paint frame to show the receipt before
          // opening the print dialog, without a blocking overlay.
          requestAnimationFrame(function(){
            requestAnimationFrame(function(){ window.print(); });
          });
        }
      }
    } finally {
      billSubmitInProgress = false;
    }
  }

  function renderAccounts(){

    if(q){
      acctBills = acctBills.filter(function(b){
        return (b.customerName||'').toLowerCase().indexOf(q)>=0 ||
          (b.customerPhone||'').toLowerCase().indexOf(q)>=0 ||

      });
    }
    acctBills = acctBills.slice().sort(function(a,b){ return new Date(b.dateISO)-new Date(a.dateISO); });

    var allAcct = state.bills.filter(function(b){ return b.payment==='account'; });
    var totalOutstanding = allAcct.reduce(function(s,b){ return s+billBalance(b); },0);
    var owingNames = {};
    allAcct.forEach(function(b){ if(billBalance(b)>0.004) owingNames[b.customerName||'(no name)'] = true; });
    var custCount = Object.keys(owingNames).length;
    var todayStr = todayISO();
    var collectedToday = 0;
    state.bills.forEach(function(b){ (b.payments||[]).forEach(function(p){ if(p.dateISO.slice(0,10)===todayStr) collectedToday += p.amount; }); });

    var rows = acctBills.map(function(b){
      var paid = billPaidTotal(b), bal = billBalance(b), status = billStatus(b);
      var isPayOpen = state.payFormOpenId === b.id;
      var isEditOpen = state.billEditForm && state.billEditForm.billId === b.id;
      var payHistHtml = billPayments_(b);
      return '<div class="card" style="margin-bottom:12px;">'+
        '<div class="list-row" style="border:none;padding:0 0 8px;">'+
          '<div class="main">'+
            '<div class="t1">'+b.no+' &middot; '+(b.customerName?escapeHtml(b.customerName):'(no name given)')+'</div>'+
            '<div class="t2">'+new Date(b.dateISO).toLocaleDateString()+(b.customerPhone?' &middot; '+escapeHtml(b.customerPhone):'')+'</div>'+
          '</div>'+

  // ---------------- CUSTOMERS ----------------
  // Built entirely from bill history — every customer name ever entered
  // on a bill, with their most recent phone/address, how much they've
  // spent in total, and any outstanding balance from account (credit) bills.
  function buildCustomerStats(){
    var map = {};
    state.bills.forEach(function(b){
      var name = (b.customerName||'').trim();
      if(!name) return;
      var key = name.toLowerCase();
      if(!map[key]) map[key] = {name:name, phone:'', address:'', bills:[], totalSpent:0, totalBalance:0, lastDateISO:b.dateISO};
      var c = map[key];
      c.bills.push(b);
      c.totalSpent += b.total;
      c.totalBalance += billBalance(b);
      if(b.customerPhone) c.phone = b.customerPhone;
      if(b.customerAddress) c.address = b.customerAddress;
      if(new Date(b.dateISO) > new Date(c.lastDateISO)) c.lastDateISO = b.dateISO;
    });
    return Object.keys(map).map(function(k){ return map[k]; });
  }

  // ---------------- REPORTS ----------------
  function billsInRange(range){
    var now = new Date();
    return state.bills.filter(function(b){
      var d = new Date(b.dateISO);
      if(range==='today') return b.dateISO.slice(0,10)===todayISO();
      if(range==='month') return monthKey(b.dateISO)===monthKey(now.toISOString());
      return true;
    });
  }

  function billItemCount(b){ return b.items.reduce(function(s,it){ return s+it.qty; },0); }

  // Bills matching the current date-range + payment-method filters on the Reports page.
  function filteredReportBills(){
    return state.bills.filter(function(b){
      var day = b.dateISO.slice(0,10);
      if(state.reportFrom && day < state.reportFrom) return false;
      if(state.reportTo && day > state.reportTo) return false;
      if(state.reportPayment!=='all' && b.payment!==state.reportPayment) return false;
      return true;
    });
  }

  function groupBillsByDay(bills){
    var map = {};
    bills.forEach(function(b){
      var day = b.dateISO.slice(0,10);
      if(!map[day]) map[day] = {date:day, bills:[], total:0, itemsSold:0};
      map[day].bills.push(b);
      map[day].total += b.total;
      map[day].itemsSold += billItemCount(b);
    });
    return Object.keys(map).sort().reverse().map(function(k){ return map[k]; });
  }

  function topItemsSummary(bills, limit){
    var map = {};
    bills.forEach(function(b){
      b.items.forEach(function(it){
        if(!map[it.name]) map[it.name] = {name:it.name, qty:0, revenue:0};
        map[it.name].qty += it.qty;
        map[it.name].revenue += it.price*it.qty;
      });
    });
    return Object.keys(map).map(function(k){ return map[k]; }).sort(function(a,b){ return b.qty-a.qty; }).slice(0, limit||5);
  }

  // Cash sales that day, plus any payments received against account
  // balances that day (assumed collected in cash), respecting the
  // reports date range but not the payment-type filter.
  function dailyCashSummary(){
    var from = state.reportFrom, to = state.reportTo;
    var inRange = function(day){ if(from && day<from) return false; if(to && day>to) return false; return true; };
    var map = {};
    function ensure(day){ if(!map[day]) map[day] = {date:day, cash:0, cheque:0, credit:0, received:0}; return map[day]; }
    state.bills.forEach(function(b){
      var day = b.dateISO.slice(0,10);
      if(!inRange(day)) return;
      var e = ensure(day);
      if(b.payment==='cash') e.cash += b.total;
      else if(b.payment==='cheque') e.cheque += b.total;
      else if(b.payment==='account') e.credit += b.total;
    });
    state.bills.forEach(function(b){
      (b.payments||[]).forEach(function(p){
        var day = p.dateISO.slice(0,10);
        if(!inRange(day)) return;
        ensure(day).received += p.amount;
      });
    });
    return Object.keys(map).sort().reverse().map(function(k){
      var r = map[k];
      r.cashOnHand = r.cash + r.received;
      return r;
    });
  }

  function setReportPreset(preset){
    var now = new Date();
    var iso = function(d){ return d.toISOString().slice(0,10); };
    if(preset==='today'){ state.reportFrom = todayISO(); state.reportTo = todayISO(); }
    else if(preset==='week'){ var w=new Date(); w.setDate(w.getDate()-6); state.reportFrom = iso(w); state.reportTo = todayISO(); }
    else if(preset==='month'){ state.reportFrom = todayISO().slice(0,8)+'01'; state.reportTo = todayISO(); }
    else { state.reportFrom=''; state.reportTo=''; }
  }

  // Old-bill search: matches by bill number, customer name or customer phone.
  // Returns the most recent 25 matches so the list stays fast and scannable.
  function billFindMatches(q){
    q = (q||'').trim().toLowerCase();
    if(!q) return [];
    var matches = state.bills.filter(function(b){
      return b.no.toLowerCase().indexOf(q)>=0 ||
        (b.customerName||'').toLowerCase().indexOf(q)>=0 ||
        (b.customerPhone||'').toLowerCase().indexOf(q)>=0;
    });
    matches.sort(function(a,b){ return new Date(b.dateISO)-new Date(a.dateISO); });
    return matches.slice(0,25);
  }

  function renderReports(){
    var todays = billsInRange('today');
    var monthly = billsInRange('month');
    var all = state.bills;
    var todaysTotal = todays.reduce(function(s,b){ return s+b.total; },0);
    var monthlyTotal = monthly.reduce(function(s,b){ return s+b.total; },0);

    var filtered = filteredReportBills();
    var fCashTotal = filtered.filter(function(b){return b.payment==='cash';}).reduce(function(s,b){return s+b.total;},0);
    var fChequeTotal = filtered.filter(function(b){return b.payment==='cheque';}).reduce(function(s,b){return s+b.total;},0);
    var fAccountTotal = filtered.filter(function(b){return b.payment==='account';}).reduce(function(s,b){return s+b.total;},0);
    var fCashCount = filtered.filter(function(b){return b.payment==='cash';}).length;
    var fChequeCount = filtered.filter(function(b){return b.payment==='cheque';}).length;
    var fAccountCount = filtered.filter(function(b){return b.payment==='account';}).length;

    var totalBills = filtered.length;
    var totalItemsSold = filtered.reduce(function(s,b){ return s+billItemCount(b); },0);
    var avgBill = totalBills ? (filtered.reduce(function(s,b){return s+b.total;},0)/totalBills) : 0;
    var filteredTotal = filtered.reduce(function(s,b){return s+b.total;},0);

    // last 7 days bar chart (always all-time, independent of filters, for quick context)
    var days=[];
    for(var i=6;i>=0;i--){
      var d = new Date(); d.setDate(d.getDate()-i);
      var iso = d.toISOString().slice(0,10);
